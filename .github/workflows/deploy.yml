name: Deploy Lovable via FTP na Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar o repositório
        uses: actions/checkout@v3

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Build do projeto
        run: npm run build

      - name: Encontrar pasta do build
        run: |
          if [ -d "dist/client" ]; then
            echo "DEPLOY_DIR=dist/client/" >> "$GITHUB_ENV"
          elif [ -d ".output/public" ]; then
            echo "DEPLOY_DIR=.output/public/" >> "$GITHUB_ENV"
          elif [ -d "dist" ]; then
            echo "DEPLOY_DIR=dist/" >> "$GITHUB_ENV"
          else
            echo "Nenhuma pasta de build encontrada. Arquivos na raiz:"
            ls -la
            exit 1
          fi

      - name: Mostrar arquivos gerados
        run: |
          echo "Deploy usando: $DEPLOY_DIR"
          ls -la "$DEPLOY_DIR"

      - name: Deploy FTP para Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          port: 21
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./${{ env.DEPLOY_DIR }}
          server-dir: /
          dangerous-clean-slate: true
          dry-run: false
          log-level: verbose
