name: Deploy Lovable via FTP na Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar o repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configurar Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Instalar dependências
        run: bun install --frozen-lockfile

      - name: Build do projeto
        run: bun run build

      - name: Preparar build estático para Hostinger
        run: node scripts/prepare-hostinger-static.mjs

      - name: Mostrar arquivos gerados
        run: |
          echo "Conteúdo preparado para envio:"
          ls -la dist/client
          test -f dist/client/index.html
          test -d dist/client/assets

      - name: Deploy FTP para Hostinger sem duplicar public_html
        run: python3 scripts/hostinger_ftp_deploy.py
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_LOCAL_DIR: dist/client
          FTP_TARGET_DIR: "."
          REMOVE_NESTED_PUBLIC_HTML: "true"
