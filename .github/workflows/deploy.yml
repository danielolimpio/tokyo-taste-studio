name: Deploy Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configurar Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Instalar dependências com Bun
        run: bun install

      - name: Build do projeto
        run: bun run build

      - name: Preparar arquivos estáticos para Hostinger
        run: node scripts/prepare-hostinger-static.mjs

      - name: Validar pacote de publicação
        run: |
          test -f hostinger-dist/index.html
          test -d hostinger-dist/assets
          ls -la hostinger-dist

      - name: Publicar na public_html correta e remover duplicada
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_LOCAL_DIR: hostinger-dist
          FTP_TARGET_DIR: "."
          FTP_ASSUME_LOGIN_IS_WEBROOT: "true"
          REMOVE_NESTED_PUBLIC_HTML: "true"
        run: python scripts/hostinger_ftp_deploy.py
