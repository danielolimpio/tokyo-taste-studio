name: Deploy Lovable via FTP na Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar o repositório
        uses: actions/checkout@v3

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Build do projeto
        run: npm run build

      - name: Preparar build para Hostinger
        run: node scripts/prepare-hostinger-static.mjs

      - name: Encontrar pasta do build
        id: build-output
        run: |
          if [ -d "dist/client" ]; then
            echo "deploy_dir=dist/client/" >> "$GITHUB_OUTPUT"
          elif [ -d ".output/public" ]; then
            echo "deploy_dir=.output/public/" >> "$GITHUB_OUTPUT"
          elif [ -d "dist" ]; then
            echo "deploy_dir=dist/" >> "$GITHUB_OUTPUT"
          else
            echo "Nenhuma pasta de build encontrada. Arquivos na raiz:"
            ls -la
            exit 1
          fi

      - name: Validar arquivos obrigatórios
        run: |
          DEPLOY_DIR="${{ steps.build-output.outputs.deploy_dir }}"
          test -f "${DEPLOY_DIR}index.html" || (echo "ERRO: index.html não foi gerado em ${DEPLOY_DIR}" && exit 1)
          test -d "${DEPLOY_DIR}assets" || (echo "ERRO: pasta assets não foi gerada em ${DEPLOY_DIR}" && exit 1)

      - name: Mostrar arquivos gerados
        run: |
          echo "Deploy usando: ${{ steps.build-output.outputs.deploy_dir }}"
          ls -la "${{ steps.build-output.outputs.deploy_dir }}"

      - name: Deploy FTP definitivo para Hostinger
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_LOCAL_DIR: ${{ steps.build-output.outputs.deploy_dir }}
          # Opcional: se existir nos Secrets, este caminho vence a detecção automática.
          # Para a conta atual, deixe vazio para publicar na raiz FTP correta.
          FTP_TARGET_DIR: ${{ secrets.FTP_SERVER_DIR }}
          REMOVE_NESTED_PUBLIC_HTML: "true"
        run: python3 scripts/hostinger_ftp_deploy.py
